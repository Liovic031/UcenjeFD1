<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine js</title>
    <script src="alpine-3.15.8.min.js" defer></script>
</head>

<body>

    <div x-data="{ open: false }">
        <button @click="open = true">Expand</button>
        <button @click="open = false">Hide</button>
        <span x-show="open">
            Content...
        </span>
        
    </div>

    <div x-data="{ brojac: 0 }">
        <h1 x-text="brojac"></h1>
        <div @click="brojac++" style="cursor: pointer;">+1</div>
        <div @click="brojac--" style="cursor: pointer;">-1</div>
    </div>

</body>

</html>
